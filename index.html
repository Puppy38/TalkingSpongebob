<!DOCTYPE html>
<html>
<head>
<title>SpongeBob Web Version</title>

<style>
body {
  margin: 0;
  background: #0078ff; /* blue background */
  overflow: hidden;
  font-family: sans-serif;
}

/* Fake window */
#window {
  width: 420px;
  height: 520px;
  position: absolute;
  top: 50px;
  left: 50px;
  background: black;
  border: 2px solid #333;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Title bar */
#titlebar {
  height: 30px;
  background: #222;
  color: white;
  padding: 5px;
  cursor: move;
}

/* Content */
#content {
  width: 100%;
  height: calc(100% - 30px);
}

#content img {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div id="window">
  <div id="titlebar">SpongeBob</div>
  <div id="content">
    <img id="bob" src="closed.jpg">
  </div>
</div>

<script>
const closedImg = "closed.jpg";
const openImg = "open.jpg";

const bob = document.getElementById("bob");

// Preload audio files
const sounds = [];
for (let i = 0; i < 10; i++) {
  sounds.push(new Audio("voice_" + i + ".mp3"));
}

function randomDelay() {
  return 10000 + Math.random() * 10000;
}

function loop() {
  setTimeout(() => {

    // open mouth
    bob.src = openImg;

    // pick random sound
    const sound = sounds[Math.floor(Math.random() * sounds.length)];
    sound.currentTime = 0;
    sound.play();

    sound.onended = () => {
      bob.src = closedImg;
      loop();
    };

  }, randomDelay());
}

loop();


// 🔵 DRAGGABLE WINDOW
const win = document.getElementById("window");
const titlebar = document.getElementById("titlebar");

let offsetX = 0, offsetY = 0, isDown = false;

titlebar.addEventListener("mousedown", (e) => {
  isDown = true;
  offsetX = e.clientX - win.offsetLeft;
  offsetY = e.clientY - win.offsetTop;
});

document.addEventListener("mouseup", () => {
  isDown = false;
});

document.addEventListener("mousemove", (e) => {
  if (isDown) {
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  }
});
</script>

</body>
</html>
